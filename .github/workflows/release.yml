name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v3.0.6'
        required: true
  repository_dispatch:
    types:
      - openapi-sdk-release

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.client_payload.tag || github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clean build artifacts
        run: rm -rf dist build ./*.egg-info

      - name: Install dependencies
        run: python -m pip install -e '.[dev]' build twine 'packaging>=24.2'

      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          if not tag.startswith("v"):
              raise SystemExit(f"Release tags must start with 'v': {tag}")

          namespace: dict[str, str] = {}
          exec(Path("justoneapi/_version.py").read_text(), namespace)
          package_version = namespace["__version__"]
          tag_version = tag.removeprefix("v")

          if tag_version != package_version:
              raise SystemExit(
                  f"Tag version {tag_version} does not match package version {package_version}"
              )

          print(f"Validated release tag {tag} for package version {package_version}")
          PY

      - name: Normalize OpenAPI
        run: python scripts/normalize_openapi.py

      - name: Generate SDK
        run: python scripts/generate_sdk.py

      - name: Ensure generated artifacts are committed
        run: git diff --exit-code -- openapi/public-api.normalized.json justoneapi/generated

      - name: Run tests
        run: python -m pytest

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          files: dist/*
          generate_release_notes: true
